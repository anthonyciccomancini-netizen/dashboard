<!DOCTYPE html>
<html lang="fr">
<head>

<title>Dashboard Anthony</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.container{max-width:600px}
h1{font-size:28px;color:#fff;margin-bottom:10px}
h1 span{color:#e94560}

.status{background:#1a1a2e;border:1px solid #233554;border-radius:12px;padding:20px;margin:20px 0}
.status .ok{color:#4ade80;font-size:20px;font-weight:bold}
.info{color:#60a5fa;font-size:14px}
</style>
</head>
<body>
<div class="container">
<h1>Dashboard <span>Anthony</span></h1>
<div class="status">
<div class="ok">Site GitHub Pages actif</div>
<p>Le dashboard complet sera deploye ici chaque matin a 7h15.</p>
</div>
<p class="info">anthonyciccomancini-netizen.github.io/dashboard</p>
</div>
</body>
